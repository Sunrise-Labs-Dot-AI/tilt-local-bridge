name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install .
      - run: python -m unittest discover -s tests
      - run: python tools/check_public_tree.py
      - run: bash -n scripts/install.sh

  secrets:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.30.1
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install pinned Gitleaks CLI
        run: |
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          release="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl --fail --silent --show-error --location --output "$RUNNER_TEMP/$archive" "$release/$archive"
          curl --fail --silent --show-error --location --output "$RUNNER_TEMP/checksums.txt" "$release/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          grep "  $archive$" "$RUNNER_TEMP/checksums.txt" > "$RUNNER_TEMP/checksum"
          cd "$RUNNER_TEMP"
          sha256sum --check checksum
          tar --extract --gzip --file "$archive" gitleaks
      - name: Scan git history for secrets
        run: "$RUNNER_TEMP/gitleaks git --redact --no-banner"
